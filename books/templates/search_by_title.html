{% extends "base.html" %}
{% block title %}Libra Online Library - Search by Title{% endblock %}
{% block body %}
<h1>Search by Title</h1>
<form action="/search_by_title" method="post">
    <label for="title">Title:</label>
    <input type="text" id="title" name="title">
    <input type="submit" value="Search">
</form>
<ul>
    {% for book in books_list %}
    <li><a href="/book/{{ book.id }}">{{ book.title }}</a> by {{ book.author }}</li>
    {% endfor %}
</ul>
{% endblock %}
